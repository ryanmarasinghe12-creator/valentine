<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be My Valentine ❤️</title>

<style>
  body {
    margin: 0;     
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    font-family: Arial, Helvetica, sans-serif;
  }

  .card {
    background: #fff;
    padding: 30px;
    width: 320px;
    border-radius: 22px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    position: relative;
    z-index: 10;
  }

  h1 {
    color: #e6005c;
    margin-bottom: 10px;
  }

  p {
    color: #444;
    font-size: 16px;
  }

  .btn-area {
    position: relative;
    height: 130px;
    margin-top: 20px;
  }

  button {
    padding: 10px 22px;
    font-size: 16px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
  }

  #yes {
    background: #e6005c;
    color: white;
  }

  #no {
    background: #ddd;
    position: absolute;
    left: 120px;
    top: 60px;
  }

  /* Floating hearts */
  .heart {
    position: absolute;
    bottom: -20px;
    color: rgba(255,255,255,0.8);
    font-size: 20px;
    animation: floatUp 6s linear infinite;
  }

  @keyframes floatUp {
    from {
      transform: translateY(0);
      opacity: 1;
    }
    to {
      transform: translateY(-120vh);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<!-- Background Music (CC0 public domain) -->
<audio id="music" loop>
  <source src="https://upload.wikimedia.org/wikipedia/commons/transcoded/7/71/Dvo%C5%99%C3%A1k_-_Romantic_Pieces_-_III.ogg/Dvo%C5%99%C3%A1k_-_Romantic_Pieces_-_III.ogg.mp3?download=" type="audio/mpeg">
  <source src="https://upload.wikimedia.org/wikipedia/commons/7/71/Dvo%C5%99%C3%A1k_-_Romantic_Pieces_-_III.ogg" type="audio/ogg">
</audio>

<div class="card" id="card">
  <h1>Hey Nuwani ❤️</h1>
  <p>
    Every smile of yours makes my world brighter  
    and my heart happier.
  </p>
  <p><strong>Will you be my Valentine? 💘</strong></p>

  <div class="btn-area">
    <button id="yes" onclick="yesClicked()">Yes 💕</button>
    <button id="no"
      onmouseover="moveNo()"
      ontouchstart="moveNo()">No 😜</button>
  </div>

  <p style="font-size:12px;color:#888;">
    (Tap anywhere if music doesn’t start 🎶)
  </p>
  <p style="font-size:11px;color:#aaa;">
    Music: “Dvořák – Romantic Pieces – III” (CC0 public domain)
  </p>
</div>

<script>
  // Music autoplay fallback
  const music = document.getElementById("music");
  document.body.addEventListener("click", () => {
    music.play().catch(() => {});
  });

  // Move NO button
  function moveNo() {
    const noBtn = document.getElementById("no");
    const maxX = 220;
    const maxY = 90;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }

  // YES clicked
  function yesClicked() {
    document.getElementById("card").innerHTML = `
      <h1>YAYYYY 💖</h1>
      <p>
        You just made me the happiest person alive 🥰  
        Thank you for choosing me.
      </p>
      <p><strong>Happy Valentine’s Day, my Valentine ❤️</strong></p>
    `;
  }

  // Floating hearts generator
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (14 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }, 300);
</script>

</body>
</html>
